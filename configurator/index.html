<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PEBB — Configurator: stel je eigen tafel samen</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root{
      --paper:#FBFAF7; --paper2:#F1EFE8; --ink:#15140F; --ink-soft:#3A372F;
      --muted:#9A968B; --hairline:#E4E1D9; --accent:#A8632F;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;height:100%;}
    body{background:var(--paper2);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none;}

    .topnav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:0.5px solid var(--hairline);background:var(--paper);}
    .brand{font-family:'Fraunces',serif;font-weight:500;letter-spacing:0.16em;font-size:19px;}
    .topnav a{font-size:12px;color:var(--ink-soft);letter-spacing:0.04em;}

    .layout{display:grid;grid-template-columns:1fr 380px;height:calc(100vh - 57px);}
    @media (max-width:880px){ .layout{grid-template-columns:1fr;height:auto;} }

    .stage{position:relative;background:radial-gradient(circle at 50% 38%, #FBFAF7 0%, #ECE7DD 78%, #E3DCCE 100%);overflow:hidden;min-height:340px;}
    @media (max-width:880px){ .stage{height:54vh;} }
    #scene{width:100%;height:100%;display:block;cursor:grab;}
    #scene:active{cursor:grabbing;}
    .stage-hint{position:absolute;left:0;right:0;bottom:16px;text-align:center;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);pointer-events:none;}
    .loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--muted);font-size:13px;}
    .spin{width:26px;height:26px;border:2px solid var(--hairline);border-top-color:var(--accent);border-radius:50%;animation:sp 0.9s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg);}}

    .panel{background:var(--paper);border-left:0.5px solid var(--hairline);display:flex;flex-direction:column;overflow:hidden;min-height:0;}
    .panel-scroll{flex:1;overflow-y:auto;padding:26px;min-height:0;}
    @media (max-width:880px){ .panel{border-left:none;border-top:0.5px solid var(--hairline);} }
    .panel h1{font-family:'Fraunces',serif;font-weight:400;font-size:24px;margin:0 0 4px;}
    .panel .sub{font-size:13px;color:var(--muted);margin:0 0 24px;}

    .group{margin-bottom:24px;}
    .group > label{display:block;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
    .opts{display:flex;flex-wrap:wrap;gap:8px;}
    .opt{font:inherit;font-size:12.5px;color:var(--ink-soft);background:none;border:0.5px solid var(--hairline);border-radius:8px;padding:9px 14px;cursor:pointer;transition:border-color .15s,background .15s,color .15s;}
    .opt:hover{border-color:var(--ink-soft);}
    .opt.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

    .swatches{display:grid;grid-template-columns:repeat(8,1fr);gap:7px;}
    .sw{aspect-ratio:1;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;}
    .sw:hover{transform:scale(1.12);}
    .sw.active{border-color:var(--ink);box-shadow:0 0 0 2px var(--paper) inset;}
    .swatches.disabled{opacity:.35;pointer-events:none;}

    .slider-row{display:flex;align-items:center;gap:12px;}
    input[type=range]{flex:1;accent-color:var(--accent);}
    .val{font-size:13px;min-width:62px;text-align:right;color:var(--ink);}

    .summary{flex-shrink:0;padding:18px 26px;background:var(--paper);border-top:0.5px solid var(--hairline);}
    .price-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
    .price-row .lbl{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);}
    .price{font-family:'Fraunces',serif;font-size:26px;}
    .btn{display:block;width:100%;text-align:center;font:inherit;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;background:var(--ink);color:var(--paper);border:none;padding:15px;border-radius:8px;cursor:pointer;transition:background .2s;}
    .btn:hover{background:var(--accent);}
  </style>
</head>
<body>
  <nav class="topnav">
    <span class="brand">PEBB</span>
    <a href="../">&larr; terug naar de site</a>
  </nav>

  <div class="layout">
    <div class="stage">
      <canvas id="scene"></canvas>
      <div class="loader" id="loader"><div class="spin"></div>3D-weergave laden…</div>
      <div class="stage-hint">Sleep om te draaien · scroll om te zoomen</div>
    </div>

    <aside class="panel">
      <div class="panel-scroll">
      <h1>Stel je tafel samen</h1>
      <p class="sub">Kies vorm, kleur, onderstel en maat. De prijs en het 3D-model passen zich direct aan.</p>

      <div class="group">
        <label>Vorm</label>
        <div class="opts" id="opt-shape">
          <button class="opt active" data-v="pam">Pam (kiezel)</button>
          <button class="opt" data-v="rond">Rond</button>
          <button class="opt" data-v="organisch">Organisch</button>
          <button class="opt" data-v="ovaal">Ovaal</button>
          <button class="opt" data-v="halve">Halve cirkel</button>
          <button class="opt" data-v="rechthoek">Rechthoek</button>
        </div>
      </div>

      <div class="group">
        <label>Afwerking</label>
        <div class="opts" id="opt-finish">
          <button class="opt active" data-v="beton">Beton-look</button>
          <button class="opt" data-v="eiken">Eiken</button>
          <button class="opt" data-v="walnoot">Walnoot</button>
        </div>
      </div>

      <div class="group" id="group-color">
        <label>Kleur <span style="color:var(--muted);text-transform:none;letter-spacing:0;">· uit 178 LAB-PAINT kleuren</span></label>
        <div class="swatches" id="opt-color"></div>
      </div>

      <div class="group">
        <label>Onderstel</label>
        <div class="opts" id="opt-base">
          <button class="opt active" data-v="kolom">Sculpturale poot</button>
          <button class="opt" data-v="poten">Ronde poten</button>
          <button class="opt" data-v="staal">Slank staal</button>
        </div>
      </div>

      <div class="group">
        <label>Lengte</label>
        <div class="slider-row">
          <input type="range" id="len" min="120" max="300" step="10" value="220" />
          <span class="val"><span id="lenv">220</span> cm</span>
        </div>
      </div>

      <div class="group" id="group-width">
        <label>Breedte</label>
        <div class="slider-row">
          <input type="range" id="wid" min="80" max="120" step="5" value="100" />
          <span class="val"><span id="widv">100</span> cm</span>
        </div>
      </div>

      </div><!-- /panel-scroll -->

      <div class="summary">
        <div class="price-row">
          <span class="lbl">Richtprijs</span>
          <span class="price" id="price">€ 1.950</span>
        </div>
        <button class="btn" id="request">Vraag deze tafel aan</button>
      </div>
    </aside>
  </div>

  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }}
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const state = {
      shape: 'pam', finish: 'beton', color: '#C9BBA3',
      base: 'kolom', len: 220, wid: 100
    };

    // curated colour set (sample of the LAB-PAINT range)
    const COLORS = ['#D8CFC0','#C9BBA3','#B98C5A','#A8632F','#8A5A4A','#6E5D52','#46514A',
                    '#5E6E5A','#8FA08A','#3C4A52','#5B6B7A','#9AA7B0','#B23A48','#D98A3D',
                    '#E0C36A','#2E2E2E'];
    const WOOD = { eiken:'#C9A06B', walnoot:'#5C3A1C' };

    // ---------- THREE setup ----------
    const canvas = document.getElementById('scene');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 100);
    camera.position.set(2.6, 1.9, 3.4);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.target.set(0, 0.45, 0);
    controls.minPolarAngle = 0.25;
    controls.maxPolarAngle = Math.PI / 2 - 0.03;
    controls.minDistance = 2.2;
    controls.maxDistance = 7;
    controls.enablePan = false;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.6;
    canvas.addEventListener('pointerdown', () => controls.autoRotate = false);

    // lighting
    scene.add(new THREE.HemisphereLight(0xffffff, 0xb9ad97, 0.85));
    const key = new THREE.DirectionalLight(0xfff4e6, 1.5);
    key.position.set(3, 6, 4);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.camera.near = 1; key.shadow.camera.far = 20;
    key.shadow.camera.left = -4; key.shadow.camera.right = 4;
    key.shadow.camera.top = 4; key.shadow.camera.bottom = -4;
    key.shadow.bias = -0.0004;
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xffffff, 0.4);
    fill.position.set(-4, 2, -2);
    scene.add(fill);

    // ground (receives soft shadow)
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.ShadowMaterial({ opacity: 0.16 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    let table = new THREE.Group();
    scene.add(table);

    const THICK = 0.06;       // tabletop thickness (m)
    const LEG_H = 0.62;       // leg height (m)

    // ---------- geometry helpers ----------
    function radiusFn(kind, t){
      // t in [0,1) around the perimeter
      const a = t * Math.PI * 2;
      if (kind === 'organisch') return 1 + 0.16*Math.sin(a*2 + 0.6) + 0.09*Math.sin(a*3 + 2.1);
      if (kind === 'pam')       return 1 + 0.12*Math.sin(a + 0.5)   + 0.05*Math.sin(a*2 + 1.2);
      return 1; // rond / ovaal use constant, scaled by L,W
    }

    function buildTopShape(kind, L, W){
      const rx = L/2, rz = W/2;
      const s = new THREE.Shape();
      if (kind === 'rechthoek'){
        const x = rx, z = rz, r = Math.min(0.18, Math.min(x,z)*0.4);
        s.moveTo(-x+r, -z);
        s.lineTo(x-r, -z); s.quadraticCurveTo(x,-z, x,-z+r);
        s.lineTo(x, z-r);  s.quadraticCurveTo(x, z, x-r, z);
        s.lineTo(-x+r, z); s.quadraticCurveTo(-x, z, -x, z-r);
        s.lineTo(-x, -z+r);s.quadraticCurveTo(-x,-z, -x+r,-z);
        return s;
      }
      if (kind === 'halve'){
        const N = 90;
        s.moveTo(-rx, 0);
        for (let i=0;i<=N;i++){ const a=Math.PI*(i/N); s.lineTo(-Math.cos(a)*rx, Math.sin(a)*rz); }
        s.lineTo(-rx, 0);
        return s;
      }
      // closed smooth loop (rond, ovaal, organisch, pam)
      const N = 140;
      for (let i=0;i<=N;i++){
        const t = i/N, a = t*Math.PI*2, r = radiusFn(kind, t);
        const x = Math.cos(a)*rx*r, z = Math.sin(a)*rz*r;
        if (i===0) s.moveTo(x, z); else s.lineTo(x, z);
      }
      return s;
    }

    function topMaterial(){
      if (state.finish === 'beton')
        return new THREE.MeshStandardMaterial({ color: state.color, roughness: 0.92, metalness: 0.02 });
      return new THREE.MeshStandardMaterial({ color: WOOD[state.finish], roughness: 0.6, metalness: 0.0 });
    }

    function buildBase(L, W, mat){
      const g = new THREE.Group();
      const topUnder = LEG_H;
      if (state.base === 'kolom'){
        const rx = Math.min(L,W) * 0.16;
        const geo = new THREE.CylinderGeometry(rx*0.9, rx*1.15, LEG_H, 48);
        const m = new THREE.Mesh(geo, mat);
        m.position.y = LEG_H/2; m.castShadow = true;
        // slightly elongate for long tables
        m.scale.x = 1 + Math.max(0,(L-1.6))*0.18;
        g.add(m);
      } else if (state.base === 'poten'){
        const inset = 0.16;
        const xs = [ -L/2+inset, L/2-inset ];
        const zs = [ -W/2+inset, W/2-inset ];
        for (const x of xs) for (const z of zs){
          const m = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.045, LEG_H, 24), mat);
          m.position.set(x, LEG_H/2, z); m.castShadow = true; g.add(m);
        }
      } else { // staal
        const steel = new THREE.MeshStandardMaterial({ color:'#2A2A2A', roughness:0.45, metalness:0.5 });
        const inset = 0.14;
        const xs = [ -L/2+inset, L/2-inset ];
        for (const x of xs){
          const leg = new THREE.Mesh(new THREE.BoxGeometry(0.05, LEG_H, W-2*inset), steel);
          leg.position.set(x, LEG_H/2, 0); leg.castShadow = true; g.add(leg);
          const foot = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.04, W-2*inset+0.1), steel);
          foot.position.set(x, 0.02, 0); g.add(foot);
        }
      }
      return g;
    }

    function rebuild(){
      scene.remove(table);
      table.traverse(o => { if (o.isMesh){ o.geometry.dispose(); } });
      table = new THREE.Group();

      const L = state.len/100, W = (state.shape==='halve' ? state.wid/100*1.0 : state.wid/100);
      const useW = (['rond'].includes(state.shape)) ? L : W;

      const mat = topMaterial();

      // top
      const shape = buildTopShape(state.shape, L, useW);
      const geo = new THREE.ExtrudeGeometry(shape, {
        depth: THICK, bevelEnabled: true, bevelThickness: 0.012, bevelSize: 0.012, bevelSegments: 3, steps: 1
      });
      geo.rotateX(-Math.PI/2);
      geo.computeBoundingBox();
      const bb = geo.boundingBox;
      geo.translate(-(bb.min.x+bb.max.x)/2, 0, -(bb.min.z+bb.max.z)/2);
      const top = new THREE.Mesh(geo, mat);
      top.position.y = LEG_H + THICK/2 + 0.012;
      top.castShadow = true; top.receiveShadow = true;
      table.add(top);

      // base
      table.add(buildBase(L, useW, state.finish==='beton'
        ? mat
        : new THREE.MeshStandardMaterial({ color: WOOD[state.finish], roughness:0.6 })));

      scene.add(table);
      controls.target.set(0, (LEG_H+THICK)/2 + 0.1, 0);
    }

    // ---------- pricing ----------
    const BASE_PRICE = { pam:1950, rond:1300, organisch:1650, ovaal:2400, halve:1450, rechthoek:1500 };
    const BASE_ADD = { kolom:0, poten:150, staal:250 };
    const FINISH_ADD = { beton:0, eiken:300, walnoot:500 };
    function price(){
      const area = (state.len/100) * (state.wid/100);
      const ref = 2.2;
      const sizeFactor = 0.6 + 0.4 * (area / ref);
      let p = BASE_PRICE[state.shape] * sizeFactor + BASE_ADD[state.base] + FINISH_ADD[state.finish];
      p = Math.round(p/10)*10;
      return p;
    }
    function fmt(n){ return '€ ' + n.toLocaleString('nl-NL'); }
    function updatePrice(){ document.getElementById('price').textContent = fmt(price()); }

    // ---------- UI ----------
    function buildSwatches(){
      const wrap = document.getElementById('opt-color');
      COLORS.forEach((c,i) => {
        const b = document.createElement('button');
        b.className = 'sw' + (c===state.color?' active':'');
        b.style.background = c;
        b.setAttribute('aria-label', 'kleur '+(i+1));
        b.addEventListener('click', () => {
          state.color = c;
          [...wrap.children].forEach(x=>x.classList.remove('active'));
          b.classList.add('active');
          rebuild(); render();
        });
        wrap.appendChild(b);
      });
    }
    function bindOpts(id, key, after){
      document.querySelectorAll('#'+id+' .opt').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#'+id+' .opt').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          state[key] = btn.dataset.v;
          if (after) after();
          rebuild(); updatePrice(); render();
        });
      });
    }
    function refreshConditionalUI(){
      const colorGroup = document.getElementById('opt-color');
      colorGroup.classList.toggle('disabled', state.finish !== 'beton');
      const widthGroup = document.getElementById('group-width');
      widthGroup.style.display = (state.shape === 'rond') ? 'none' : '';
    }

    bindOpts('opt-shape','shape', refreshConditionalUI);
    bindOpts('opt-finish','finish', refreshConditionalUI);
    bindOpts('opt-base','base');
    buildSwatches();

    const len = document.getElementById('len'), wid = document.getElementById('wid');
    len.addEventListener('input', () => { state.len=+len.value; document.getElementById('lenv').textContent=len.value; rebuild(); updatePrice(); render(); });
    wid.addEventListener('input', () => { state.wid=+wid.value; document.getElementById('widv').textContent=wid.value; rebuild(); updatePrice(); render(); });

    document.getElementById('request').addEventListener('click', () => {
      const lines = [
        'Ik wil graag een tafel op maat aanvragen:',
        '', 'Vorm: '+state.shape, 'Afwerking: '+state.finish,
        (state.finish==='beton' ? 'Kleur: '+state.color : ''),
        'Onderstel: '+state.base,
        'Lengte: '+state.len+' cm',
        (state.shape!=='rond' ? 'Breedte: '+state.wid+' cm' : ''),
        'Richtprijs: '+fmt(price()), ''
      ].filter(Boolean);
      window.location.href = 'mailto:info@pebb.nl?subject=' +
        encodeURIComponent('Maatwerk tafel via configurator') +
        '&body=' + encodeURIComponent(lines.join('\n'));
    });

    // ---------- render loop ----------
    function resize(){
      const r = canvas.getBoundingClientRect();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(r.width, r.height, false);
      camera.aspect = r.width / Math.max(1, r.height);
      camera.updateProjectionMatrix();
    }
    let needsRender = true;
    function render(){ needsRender = true; }
    window.addEventListener('resize', () => { resize(); render(); });

    refreshConditionalUI();
    rebuild();
    updatePrice();
    resize();
    document.getElementById('loader').style.display = 'none';

    function loop(){
      requestAnimationFrame(loop);
      const moving = controls.update(); // returns true while damping/autorotate
      if (needsRender || moving || controls.autoRotate){
        renderer.render(scene, camera);
        needsRender = false;
      }
    }
    loop();
  </script>
</body>
</html>
